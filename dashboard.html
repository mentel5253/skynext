<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyNext - דשבורד מנהל</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root {
            --gold: #dbb04a;
            --gold-light: #f0d080;
            --blue: #637ef7;
            --dark: #1a1a2e;
            --dark2: #16213e;
            --dark3: #0f3460;
            --card: rgba(255,255,255,0.05);
            --card-border: rgba(255,255,255,0.1);
            --text: #ffffff;
            --text-muted: #8899aa;
            --green: #2ecc71;
            --red: #e74c3c;
            --header-h: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            direction: rtl;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99,126,247,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(219,176,74,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== LOGIN ===== */
        #login-screen {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            background: var(--dark);
        }

        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px 40px;
            width: 380px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .login-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .login-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 3px;
            font-family: 'Heebo', sans-serif;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(219,176,74,0.08);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            transition: 0.3s;
        }

        .login-btn:hover { background: var(--gold-light); transform: translateY(-2px); }
        .login-error { color: var(--red); font-size: 0.9rem; margin-top: 10px; min-height: 20px; }

        /* ===== HEADER ===== */
        .header {
            position: fixed; top: 0; right: 0; left: 0;
            height: var(--header-h);
            background: rgba(26,26,46,0.95);
            border-bottom: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-brand {
            display: flex; align-items: center; gap: 12px;
        }

        .header-logo-text {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 1px;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .header-actions { display: flex; align-items: center; gap: 15px; }

        .last-update {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .refresh-btn {
            padding: 8px 20px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* ===== MAIN ===== */
        .main {
            padding: calc(var(--header-h) + 30px) 30px 40px;
            position: relative; z-index: 1;
        }

        /* ===== KPI CARDS ===== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            animation: fadeUp 0.5s ease both;
        }

        .kpi-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
        .kpi-card:nth-child(1) { animation-delay: 0.1s; }
        .kpi-card:nth-child(2) { animation-delay: 0.2s; }
        .kpi-card:nth-child(3) { animation-delay: 0.3s; }
        .kpi-card:nth-child(4) { animation-delay: 0.4s; }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 80px; height: 80px;
            border-radius: 50%;
            opacity: 0.1;
            transform: translate(20px, -20px);
        }

        .kpi-card.gold::before { background: var(--gold); }
        .kpi-card.blue::before { background: var(--blue); }
        .kpi-card.green::before { background: var(--green); }
        .kpi-card.red::before { background: var(--red); }

        .kpi-icon { font-size: 1.8rem; margin-bottom: 15px; }
        .kpi-value { font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; }
        .kpi-card.gold .kpi-value { color: var(--gold); }
        .kpi-card.blue .kpi-value { color: var(--blue); }
        .kpi-card.green .kpi-value { color: var(--green); }
        .kpi-card.red .kpi-value { color: var(--red); }
        .kpi-label { color: var(--text-muted); font-size: 0.9rem; }

        /* ===== GRID ===== */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 25px;
            animation: fadeUp 0.5s ease both;
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title span { color: var(--gold); }

        /* ===== TABLE ===== */
        .students-table {
            width: 100%;
            border-collapse: collapse;
        }

        .students-table th {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 15px;
            border-bottom: 1px solid var(--card-border);
            text-align: right;
            font-weight: 600;
        }

        .students-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.95rem;
        }

        .students-table tr:hover td { background: rgba(255,255,255,0.03); }

        .rank-badge {
            width: 28px; height: 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .rank-1 { background: var(--gold); color: #1a1a2e; }
        .rank-2 { background: #aaa; color: #1a1a2e; }
        .rank-3 { background: #cd7f32; color: #1a1a2e; }
        .rank-other { background: rgba(255,255,255,0.1); color: var(--text-muted); }

        .score-bar-wrap { display: flex; align-items: center; gap: 10px; }
        .score-bar-bg {
            flex: 1; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; overflow: hidden;
        }
        .score-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
        .score-text { font-weight: 700; font-size: 0.9rem; min-width: 40px; }

        .pass { color: var(--green); }
        .fail { color: var(--red); }

        /* ===== LEADERBOARD ===== */
        .leader-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .leader-item:last-child { border-bottom: none; }

        .leader-rank { font-size: 1.2rem; width: 30px; text-align: center; }
        .leader-name { flex: 1; font-weight: 600; }
        .leader-score {
            font-weight: 900;
            font-size: 1.1rem;
        }

        /* ===== HARD QUESTIONS ===== */
        .hard-q-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .hard-q-item:last-child { border-bottom: none; }

        .hard-q-text {
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: var(--text);
            line-height: 1.4;
        }

        .hard-q-bar-wrap { display: flex; align-items: center; gap: 8px; }
        .hard-q-pct { font-size: 0.85rem; color: var(--red); font-weight: 700; min-width: 40px; }

        /* ===== ALERTS ===== */
        .alert-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.2);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .alert-icon { font-size: 1.2rem; }
        .alert-name { font-weight: 600; flex: 1; }
        .alert-score { color: var(--red); font-weight: 700; }

        /* ===== LOADING ===== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
            font-size: 1rem;
            gap: 10px;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        canvas { max-height: 280px; }

        @media (max-width: 768px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .main { padding: calc(var(--header-h) + 20px) 15px 30px; }
        }
    </style>
</head>
<body>

<!-- מסך כניסה -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">✈ SkyNext</div>
        <div class="login-sub">דשבורד ניהול ובקרה</div>
        <input type="password" class="login-input" id="admin-pass" placeholder="קוד גישה" onkeydown="if(event.key==='Enter') doLogin()">
        <button class="login-btn" onclick="doLogin()">כניסה למערכת</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- כותרת -->
<header class="header" id="main-header" style="display:none;">
    <div class="header-brand">
        <div>
            <div class="header-logo-text">✈ SkyNext</div>
            <div class="header-subtitle">דשבורד ניהול ובקרה</div>
        </div>
    </div>
    <div class="header-actions">
        <div class="last-update" id="last-update"></div>
        <button class="refresh-btn" onclick="loadData()">🔄 רענן נתונים</button>
    </div>
</header>

<!-- תוכן ראשי -->
<main class="main" id="dashboard" style="display:none;">

    <!-- KPI -->
    <div class="kpi-grid">
        <div class="kpi-card gold">
            <div class="kpi-icon">📊</div>
            <div class="kpi-value" id="kpi-avg">--</div>
            <div class="kpi-label">ממוצע כיתתי</div>
        </div>
        <div class="kpi-card blue">
            <div class="kpi-icon">👥</div>
            <div class="kpi-value" id="kpi-total">--</div>
            <div class="kpi-label">סה"כ חניכים</div>
        </div>
        <div class="kpi-card green">
            <div class="kpi-icon">✅</div>
            <div class="kpi-value" id="kpi-pass">--</div>
            <div class="kpi-label">עברו את המבחן</div>
        </div>
        <div class="kpi-card red">
            <div class="kpi-icon">⚠️</div>
            <div class="kpi-value" id="kpi-fail">--</div>
            <div class="kpi-label">נכשלו</div>
        </div>
    </div>

    <!-- גרף + לידרבורד -->
    <div class="grid-3">
        <div class="panel">
            <div class="panel-title"><span>📈</span> ציוני חניכים</div>
            <canvas id="chart-scores"></canvas>
        </div>
        <div class="panel">
            <div class="panel-title"><span>🏆</span> לידרבורד</div>
            <div id="leaderboard-list"></div>
        </div>
    </div>

    <!-- טבלת חניכים + שאלות קשות -->
    <div class="grid-2">
        <div class="panel">
            <div class="panel-title"><span>👤</span> טבלת חניכים מלאה</div>
            <div id="students-table-wrap">
                <div class="loading"><div class="spinner"></div> טוען נתונים...</div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title"><span>🔴</span> התראות — חניכים שנכשלו</div>
            <div id="alerts-wrap"></div>
            <div class="panel-title" style="margin-top:25px;"><span>❓</span> שאלות הכי קשות</div>
            <div id="hard-questions-wrap">
                <div class="loading"><div class="spinner"></div> טוען...</div>
            </div>
        </div>
    </div>

</main>

<script>
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxtXQmKYccjaFLwBm7GOfWlCeOMJmIcgucZqJCDykqGR0bN6EUh1eT1xYFxpLOXvkjtGQ/exec";
const ADMIN_PASS = "pilot100";
let chartScores = null;

function doLogin() {
    const val = document.getElementById('admin-pass').value.trim();
    if (val === ADMIN_PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
    } else {
        document.getElementById('login-error').innerText = 'קוד גישה שגוי. נסה שוב.';
        document.getElementById('admin-pass').value = '';
    }
}

async function loadData() {
    try {
        const response = await fetch(`${GOOGLE_URL}?action=getStats`);
        const text = await response.text();
        const data = JSON.parse(text);
        renderDashboard(data);
        document.getElementById('last-update').innerText = 'עדכון אחרון: ' + new Date().toLocaleTimeString('he-IL');
    } catch(e) {
        console.error(e);
    }
}

function renderDashboard(data) {
    const students = data.students || [];
    if (students.length === 0) return;

    // חישובים
    const avgs = students.map(s => s.avg * 100);
    const totalStudents = students.length;
    const passed = students.filter(s => s.avg * 100 >= 70).length;
    const failed = totalStudents - passed;
    const classAvg = avgs.reduce((a,b) => a+b, 0) / avgs.length;

    // KPI
    document.getElementById('kpi-avg').innerText = Math.round(classAvg) + '%';
    document.getElementById('kpi-total').innerText = totalStudents;
    document.getElementById('kpi-pass').innerText = passed;
    document.getElementById('kpi-fail').innerText = failed;

    // גרף ציונים
    renderChart(students);

    // לידרבורד
    renderLeaderboard(students);

    // טבלה מלאה
    renderTable(students);

    // התראות
    renderAlerts(students);

    // שאלות קשות
    renderHardQuestions(data.hardQuestions || []);
}

function renderChart(students) {
    const sorted = [...students].sort((a,b) => b.avg - a.avg);
    const labels = sorted.map(s => s.name);
    const values = sorted.map(s => Math.round(s.avg * 100));
    const colors = values.map(v => v >= 70 ? 'rgba(46,204,113,0.8)' : 'rgba(231,76,60,0.8)');

    if (chartScores) chartScores.destroy();
    const ctx = document.getElementById('chart-scores').getContext('2d');
    chartScores = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                data: values,
                backgroundColor: colors,
                borderRadius: 6,
                borderSkipped: false
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: { label: ctx => ctx.parsed.y + '%' }
                }
            },
            scales: {
                y: {
                    min: 0, max: 100,
                    ticks: { color: '#8899aa', callback: v => v + '%' },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                },
                x: {
                    ticks: { color: '#8899aa', maxRotation: 45 },
                    grid: { display: false }
                }
            }
        }
    });
}

function renderLeaderboard(students) {
    const sorted = [...students].sort((a,b) => b.avg - a.avg).slice(0, 8);
    const medals = ['🥇','🥈','🥉'];
    const html = sorted.map((s, i) => `
        <div class="leader-item">
            <div class="leader-rank">${medals[i] || (i+1)}</div>
            <div class="leader-name">${s.name}</div>
            <div class="leader-score ${s.avg*100 >= 70 ? 'pass' : 'fail'}">${Math.round(s.avg*100)}%</div>
        </div>
    `).join('');
    document.getElementById('leaderboard-list').innerHTML = html;
}

function renderTable(students) {
    const sorted = [...students].sort((a,b) => b.avg - a.avg);
    const rows = sorted.map((s, i) => {
        const score = Math.round(s.avg * 100);
        const barColor = score >= 70 ? '#2ecc71' : '#e74c3c';
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
        return `<tr>
            <td><span class="rank-badge ${rankClass}">${i+1}</span></td>
            <td>${s.name}</td>
            <td>${s.count}</td>
            <td>
                <div class="score-bar-wrap">
                    <div class="score-bar-bg">
                        <div class="score-bar-fill" style="width:${score}%; background:${barColor};"></div>
                    </div>
                    <div class="score-text ${score >= 70 ? 'pass' : 'fail'}">${score}%</div>
                </div>
            </td>
        </tr>`;
    }).join('');

    document.getElementById('students-table-wrap').innerHTML = `
        <table class="students-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>שם חניך</th>
                    <th>מבחנים</th>
                    <th>ממוצע</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function renderAlerts(students) {
    const failed = students.filter(s => s.avg * 100 < 70).sort((a,b) => a.avg - b.avg);
    if (failed.length === 0) {
        document.getElementById('alerts-wrap').innerHTML = `<div style="color:var(--green); font-size:0.9rem; padding:10px 0;">✅ כל החניכים עברו את המבחן!</div>`;
        return;
    }
    const html = failed.map(s => `
        <div class="alert-item">
            <div class="alert-icon">⚠️</div>
            <div class="alert-name">${s.name}</div>
            <div class="alert-score">${Math.round(s.avg*100)}%</div>
        </div>
    `).join('');
    document.getElementById('alerts-wrap').innerHTML = html;
}

function renderHardQuestions(hardQs) {
    if (!hardQs || hardQs.length === 0) {
        document.getElementById('hard-questions-wrap').innerHTML = `<div style="color:var(--text-muted); font-size:0.9rem;">אין מספיק נתונים עדיין.</div>`;
        return;
    }
    const html = hardQs.slice(0, 5).map(q => `
        <div class="hard-q-item">
            <div class="hard-q-text">${q.text}</div>
            <div class="hard-q-bar-wrap">
                <div class="score-bar-bg" style="flex:1;">
                    <div class="score-bar-fill" style="width:${q.errorRate}%; background:var(--red);"></div>
                </div>
                <div class="hard-q-pct">${q.errorRate}% טעויות</div>
            </div>
        </div>
    `).join('');
    document.getElementById('hard-questions-wrap').innerHTML = html;
}
</script>
</body>
</html>
